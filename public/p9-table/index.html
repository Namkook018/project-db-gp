<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตารางสอนคาบ 9</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1814;--ink2:#4a4740;--ink3:#8a8780;
  --paper:#faf9f5;--card:#ffffff;--card2:#f5f4f0;
  --rule:#e8e5de;--rule2:#d4d0c8;
  --teal:#0b6e6e;--teal-l:#e4f4f4;
  --red:#b02020;
  --r:10px;--r-sm:6px;
  --font:'Noto Sans Thai',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
body{font-family:var(--font);background:var(--paper);color:var(--ink);font-size:13px;min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}

/* sidebar */
.sidebar{width:210px;min-width:210px;background:var(--card);border-right:2px solid var(--rule);display:flex;flex-direction:column;overflow:hidden}
.sb-header{background:var(--ink);padding:14px 12px;flex-shrink:0}
.sb-header-title{font-size:13px;font-weight:700;color:#fff}
.sb-header-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;font-family:var(--mono)}
.sb-section{padding:10px 12px 4px;font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.07em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.add-btn{width:22px;height:22px;border-radius:50%;background:var(--teal);color:#fff;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.add-btn:hover{background:#095a5a;transform:scale(1.08)}
.teacher-list{padding:4px 8px 8px;flex:1;overflow-y:auto}
.teacher-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r-sm);margin-bottom:2px;border:1px solid transparent;transition:all .15s}
.teacher-item:hover{background:var(--card2);border-color:var(--rule)}
.t-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.t-name{font-size:12px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.del-btn{width:18px;height:18px;border-radius:50%;background:none;border:none;cursor:pointer;color:var(--ink3);font-size:11px;opacity:0;transition:opacity .15s;display:flex;align-items:center;justify-content:center}
.teacher-item:hover .del-btn{opacity:1}
.del-btn:hover{color:var(--red)}
.sb-footer{padding:10px 12px;border-top:1px solid var(--rule);flex-shrink:0;display:flex;flex-direction:column;gap:6px}

.btn{padding:5px 12px;border-radius:var(--r-sm);border:1.5px solid var(--rule2);background:var(--card);color:var(--ink2);font-family:var(--font);font-size:12px;cursor:pointer;transition:all .15s;font-weight:600}
.btn:hover{border-color:var(--teal);color:var(--teal)}
.btn-amber{background:#b5651d;color:#fff;border-color:#b5651d}
.btn-amber:hover{background:#8a4c14;border-color:#8a4c14;color:#fff}
.btn-sm{font-size:11px;padding:4px 10px}

/* main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--ink);color:#fff;height:54px;display:flex;align-items:center;gap:12px;padding:0 20px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700}
.topbar-badge{background:rgba(255,255,255,.12);border-radius:999px;padding:2px 10px;font-size:10px;font-family:var(--mono);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.15)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
#save-status{font-size:10px;color:rgba(255,255,255,.35);font-family:var(--mono)}

/* grid */
.grid-wrap{flex:1;overflow:auto;padding:24px;display:flex;align-items:flex-start;justify-content:center}
table.grid{border-collapse:collapse;min-width:600px}
table.grid thead th{background:var(--ink);color:#fff;padding:10px 20px;font-size:13px;font-weight:700;text-align:center;border:1px solid #444;white-space:nowrap}
table.grid thead th.room-th{text-align:left;width:90px;font-size:12px}
table.grid tbody td{border:1px solid var(--rule2);padding:6px;vertical-align:middle;min-width:160px;min-height:64px}
td.room-td{background:var(--card2);padding:10px 14px;vertical-align:middle;white-space:nowrap;font-weight:700;font-size:14px;color:var(--teal);border-right:2px solid var(--rule2)}
.cell{min-height:60px;border-radius:var(--r-sm);padding:6px 8px;cursor:pointer;transition:all .15s;position:relative;display:flex;align-items:center;justify-content:center}
.cell.empty{border:1.5px dashed var(--rule2)}
.cell.empty:hover{background:var(--teal-l);border-color:var(--teal)}
.cell.filled{border:1px solid #9dd4d4;background:var(--teal-l)}
.cell-name{font-size:13px;font-weight:700;text-align:center;line-height:1.4}
.cell-x{position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:50%;background:rgba(176,32,32,.1);border:none;cursor:pointer;color:var(--red);font-size:9px;display:none;align-items:center;justify-content:center;font-family:var(--mono)}
.cell.filled:hover .cell-x{display:flex}
.empty-hint{font-size:20px;color:var(--rule2);transition:color .15s}
.cell.empty:hover .empty-hint{color:var(--teal)}

/* picker */
.picker{position:fixed;z-index:200;background:var(--card);border:1.5px solid var(--rule2);border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.14);padding:6px;min-width:190px;max-height:280px;overflow-y:auto}
.picker-item{padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;font-size:13px;font-weight:600;transition:background .12s}
.picker-item:hover{background:var(--teal-l)}
.picker-sep{height:1px;background:var(--rule);margin:4px 0}
.picker-clear{padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;font-size:12px;color:var(--red);font-weight:500}
.picker-clear:hover{background:#fdf0f0}

/* toast */
.toasts{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:6px;z-index:999;pointer-events:none}
.toast{background:var(--ink);color:#fff;padding:8px 14px;border-radius:var(--r-sm);font-size:12px;animation:toastIn .2s}
@keyframes toastIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-header">
      <div class="sb-header-title">ตารางสอนคาบ 9</div>
      <div class="sb-header-sub">จ–ศ · 16.45–17.45 น.</div>
    </div>
    <div class="sb-section">
      <span>ครูผู้สอน</span>
      <button class="add-btn" onclick="addTeacher()" title="เพิ่มครู">+</button>
    </div>
    <div class="teacher-list" id="teacher-list"></div>
    <div class="sb-footer">
      <button class="btn btn-amber btn-sm" onclick="doPrint()">🖨 พิมพ์ / PDF</button>
      <button class="btn btn-sm" onclick="clearAll()">🗑 ล้างตารางทั้งหมด</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div style="font-size:18px">📋</div>
      <div class="topbar-title">ตารางสอนคาบ 9</div>
      <span class="topbar-badge">จันทร์–ศุกร์ · 16.45–17.45 น.</span>
      <div class="topbar-right">
        <span id="save-status"></span>
        <button onclick="configureSheets()" title="ตั้งค่า sync"
          style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,.5);font-size:12px;font-family:var(--mono);padding:4px 8px;border-radius:var(--r-sm);transition:all .15s"
          onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,.5)'">
          <span id="sync-badge">☁ off</span>
        </button>
      </div>
    </div>
    <div class="grid-wrap">
      <table class="grid" id="grid"></table>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
const DB_KEY = 'p9_timetable_v2';
const SHEETS_URL_KEY = 'p9_timetable_sheets_url';
const DAYS_FULL  = ['วันจันทร์','วันอังคาร','วันพุธ','วันพฤหัสบดี','วันศุกร์'];
const DAYS_SHORT = ['จ','อ','พ','พฤ','ศ'];
const COLORS = ['#0b6e6e','#b5651d','#1a4a7a','#7b3fa0','#b02020','#1a6e3c','#6e5a1a','#2a5a7a','#8a2060','#3a6e1a'];
const CLASSES = [
  {id:'m1',label:'ม.1/9'},{id:'m2',label:'ม.2/9'},{id:'m3',label:'ม.3/9'},
  {id:'m4',label:'ม.4/9'},{id:'m5',label:'ม.5/9'},{id:'m6',label:'ม.6/9'},
];

let db = { teachers:[], schedule:{} };
// schedule key: classId_dayIndex (0=จ … 4=ศ)

// ── SYNC ────────────────────────────────────────────
function getSheetsUrl(){ return localStorage.getItem(SHEETS_URL_KEY)||''; }
function setSheetsUrl(u){ if(u) localStorage.setItem(SHEETS_URL_KEY,u); else localStorage.removeItem(SHEETS_URL_KEY); updateSyncBadge(); }
function updateSyncBadge(){
  const el=document.getElementById('sync-badge'); if(!el) return;
  el.textContent=getSheetsUrl()?'☁ sheet':'☁ off';
  el.style.color=getSheetsUrl()?'rgba(155,220,180,.95)':'rgba(255,255,255,.5)';
}
function configureSheets(){
  const cur=getSheetsUrl();
  const u=prompt('วาง Apps Script Web App URL\n(เว้นว่าง = ปิด sync):',cur);
  if(u===null) return;
  const trimmed=u.trim();
  if(trimmed&&!/^https:\/\/script\.google\.com\//.test(trimmed)){ toast('URL ต้องเริ่มด้วย https://script.google.com/'); return; }
  setSheetsUrl(trimmed);
  toast(trimmed?'เปิด sync แล้ว — กำลังโหลด...':'ปิด sync');
  if(trimmed) dbLoad().then(renderGrid);
}

// ── DB ──────────────────────────────────────────────
async function dbLoad(){
  const url=getSheetsUrl();
  if(url){
    try{
      const res=await fetch(url,{method:'GET'});
      const txt=await res.text();
      if(txt&&txt.trim().startsWith('{')){
        const remote=JSON.parse(txt);
        if(remote&&remote.teachers!==undefined){ db=remote; try{ localStorage.setItem(DB_KEY,JSON.stringify(db)); }catch(_){} return; }
      }
    }catch(_){ toast('โหลด sheet ล้มเหลว ใช้ local แทน'); }
  }
  try{ const r=localStorage.getItem(DB_KEY); if(r) db=JSON.parse(r); }catch(_){}
}

let _saveTimer=null, _syncing=false;
function dbSave(){
  try{
    localStorage.setItem(DB_KEY,JSON.stringify(db));
    const t=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('save-status').textContent='บันทึก '+t;
  }catch(_){ toast('Storage เต็ม!'); }
  const url=getSheetsUrl(); if(!url) return;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>cloudPush(url),800);
}
async function cloudPush(url){
  if(_syncing) return; _syncing=true;
  const badge=document.getElementById('sync-badge');
  if(badge) badge.textContent='☁ saving...';
  try{
    await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(db)});
    if(badge){ badge.textContent='☁ synced'; setTimeout(updateSyncBadge,1500); }
  }catch(e){
    toast('Sync ล้มเหลว: '+e.message);
    if(badge) badge.textContent='☁ error';
  }finally{ _syncing=false; }
}

function getS(clsId,di){ return db.schedule[clsId+'_'+di]||null; }
function setS(clsId,di,tid){ if(tid) db.schedule[clsId+'_'+di]={teacherId:tid}; else delete db.schedule[clsId+'_'+di]; dbSave(); }

// ── RENDER ──────────────────────────────────────────
function renderTeachers(){
  const el=document.getElementById('teacher-list');
  if(!db.teachers.length){
    el.innerHTML='<div style="font-size:11px;color:var(--ink3);padding:8px;line-height:1.7">กด + เพื่อเพิ่มครู<br>คลิกช่องในตารางเพื่อมอบหมาย</div>';
    return;
  }
  el.innerHTML=db.teachers.map(t=>`
    <div class="teacher-item">
      <div class="t-dot" style="background:${t.color}"></div>
      <div class="t-name">${t.name}</div>
      <button class="del-btn" onclick="delTeacher('${t.id}')">✕</button>
    </div>`).join('');
}

function renderGrid(){
  const ths=DAYS_FULL.map((d,i)=>`<th>${d}<br><span style="font-size:9px;font-weight:400;opacity:.6">${DAYS_SHORT[i]}</span></th>`).join('');
  const rows=CLASSES.map(cl=>{
    const cells=DAYS_FULL.map((_,di)=>{
      const s=getS(cl.id,di);
      const t=s?db.teachers.find(x=>x.id===s.teacherId):null;
      if(t) return `<td>
        <div class="cell filled" onclick="openPicker('${cl.id}',${di},this)">
          <div class="cell-name" style="color:${t.color}">${t.name}</div>
          <button class="cell-x" onclick="event.stopPropagation();setS('${cl.id}',${di},null);renderGrid()">✕</button>
        </div>
      </td>`;
      return `<td>
        <div class="cell empty" onclick="openPicker('${cl.id}',${di},this)">
          <span class="empty-hint">+</span>
        </div>
      </td>`;
    }).join('');
    return `<tr><td class="room-td">${cl.label}</td>${cells}</tr>`;
  }).join('');

  document.getElementById('grid').innerHTML=`
    <thead><tr><th class="room-th">ห้องเรียน</th>${ths}</tr></thead>
    <tbody>${rows}</tbody>`;
}

// ── PICKER ──────────────────────────────────────────
let _pCls='', _pDi=0;
function openPicker(clsId,di,el){
  closePicker(); _pCls=clsId; _pDi=di;
  const rect=el.getBoundingClientRect();
  const p=document.createElement('div'); p.className='picker'; p.id='picker';
  if(!db.teachers.length){
    p.innerHTML='<div style="font-size:12px;color:var(--ink3);padding:8px 10px">กด + เพื่อเพิ่มครูก่อน</div>';
  }else{
    p.innerHTML=db.teachers.map(t=>`
      <div class="picker-item" style="color:${t.color}" onclick="assignTeacher('${t.id}')">${t.name}</div>
    `).join('')+'<div class="picker-sep"></div><div class="picker-clear" onclick="assignTeacher(null)">✕ ล้างช่องนี้</div>';
  }
  let top=rect.bottom+4, left=rect.left;
  if(top+280>window.innerHeight) top=rect.top-284;
  if(left+200>window.innerWidth) left=window.innerWidth-204;
  p.style.cssText+=`;top:${top}px;left:${left}px`;
  document.body.appendChild(p);
  setTimeout(()=>document.addEventListener('click',closePicker,{once:true}),0);
}
function assignTeacher(tid){ setS(_pCls,_pDi,tid); closePicker(); renderGrid(); }
function closePicker(){ const p=document.getElementById('picker'); if(p) p.remove(); }

// ── CRUD ────────────────────────────────────────────
function addTeacher(){
  const name=prompt('ชื่อครู:',''); if(!name||!name.trim()) return;
  const id='t'+Date.now(), color=COLORS[db.teachers.length%COLORS.length];
  db.teachers.push({id,name:name.trim(),color});
  dbSave(); renderTeachers();
}
function delTeacher(id){
  const t=db.teachers.find(x=>x.id===id);
  if(!t||!confirm('ลบ "'+t.name+'" ?')) return;
  db.teachers=db.teachers.filter(x=>x.id!==id);
  Object.keys(db.schedule).forEach(k=>{ if(db.schedule[k].teacherId===id) delete db.schedule[k]; });
  dbSave(); renderTeachers(); renderGrid();
}
function clearAll(){
  if(!confirm('ล้างการมอบหมายครูทั้งหมด?')) return;
  db.schedule={}; dbSave(); renderGrid(); toast('ล้างตารางแล้ว');
}

// ── PDF ─────────────────────────────────────────────
function doPrint(){
  const ths=DAYS_FULL.map(d=>`
    <th style="border:1px solid #ddd;padding:10px 16px;background:#1a1814;color:#fff;font-weight:700;text-align:center;min-width:140px">${d}</th>
  `).join('');
  const rows=CLASSES.map(cl=>{
    const cells=DAYS_FULL.map((_,di)=>{
      const s=getS(cl.id,di); const t=s?db.teachers.find(x=>x.id===s.teacherId):null;
      if(t) return `<td style="border:1px solid #ddd;padding:10px 14px;text-align:center">
        <div style="font-weight:700;font-size:13px;color:${t.color}">${t.name}</div>
      </td>`;
      return `<td style="border:1px solid #ddd;padding:10px 14px;text-align:center">
        <span style="color:#ccc">—</span>
      </td>`;
    }).join('');
    return `<tr>
      <td style="border:1px solid #ddd;padding:10px 16px;background:#f7f7f5;font-weight:700;font-size:14px;color:#0b6e6e;white-space:nowrap">${cl.label}</td>
      ${cells}
    </tr>`;
  }).join('');

  const html=`<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">
  <title>ตารางสอนคาบ 9</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Noto Sans Thai',sans-serif;font-size:13px;background:#fff;padding:18px 22px}
  @media print{body{padding:8mm 10mm}@page{size:A4 landscape;margin:8mm}}</style></head><body>
  <div style="margin-bottom:14px;padding-bottom:10px;border-bottom:2.5px solid #1a1814">
    <h2 style="font-size:22px;font-weight:800;color:#1a1814">ตารางสอนคาบ 9</h2>
    <div style="font-size:11px;color:#888;margin-top:3px;font-family:monospace">วันจันทร์–ศุกร์ · 16.45–17.45 น. · ภาคเรียน 1/2569</div>
  </div>
  <table style="width:100%;border-collapse:collapse">
    <thead><tr>
      <th style="border:1px solid #ddd;padding:10px 16px;background:#1a1814;color:#fff;font-weight:700;text-align:left;width:100px">ห้องเรียน</th>
      ${ths}
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div style="margin-top:10px;font-size:10px;color:#bbb;text-align:right">พิมพ์ ${new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'})}</div>
  <script>if(document.fonts){document.fonts.ready.then(()=>setTimeout(()=>window.print(),400));}else{setTimeout(()=>window.print(),1200);}<\/script>
  </body></html>`;

  try{
    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.target='_blank'; a.rel='noopener';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},2000);
    toast('เปิด PDF แล้ว');
  }catch(_){ toast('กด Ctrl+P เพื่อพิมพ์'); }
}

// ── TOAST ───────────────────────────────────────────
function toast(msg){ const el=document.createElement('div'); el.className='toast'; el.textContent=msg; document.getElementById('toasts').appendChild(el); setTimeout(()=>el.remove(),2500); }

// ── INIT ────────────────────────────────────────────
(async()=>{ await dbLoad(); updateSyncBadge(); renderTeachers(); renderGrid(); })();
</script>
</body>
</html>
